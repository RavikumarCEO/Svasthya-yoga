<body>
    <!-- Contact Header nav -->
    <section class="header">
        <div class="img-logo">
            <a href="index.html">
                <img class="logo_img" src="/img/SV_Yoga_logo_transparent.png" alt="logo picture">
            </a>
        </div>

        </div>

    <!-- Contact Forms -->

    <section class="forms">
        <div class="form-content">
            <h2>Contact Us</h2>
            <form action="/somewhere">
                <div class="form-value">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter your name">
                </div>
                <div class="form-value">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-value">
                    <label for="phone">Phone Number</label>
                    <input type="tel" name="phone" id="phone" placeholder="Enter your phone No">
                </div>
                <div class="form-value">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" cols="30" rows="10"
                        placeholder="Enter Your Message or Doubts"></textarea>
                </div>

                <button class="btn-form" type="submit">SUBMIT</button>

            </form>
        </div>

        <div class="address">
            <div class="address-content">
                <address>
                    <h2>Svasthya yoga</h2>
                    <p>202, S Masi St, Periyar,  Madurai Main, Madurai, <br>
                        Tamil Nadu - 625001</p>

            </div>
            <div class="list-add">
                <p>📍 <strong>Address</strong>  : Madurai</p>

            </div>
        </div>
    </section>

</body>
